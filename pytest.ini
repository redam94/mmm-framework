[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
asyncio_mode = strict
filterwarnings =
    # Scope the deprecation silence to noisy THIRD-PARTY libraries only, so new
    # arviz/pymc/pytensor (and first-party) deprecations stay visible -- they are
    # the early-warning signal for the API drift utils/arviz_compat.py absorbs.
    ignore::pydantic.warnings.PydanticDeprecatedSince20
    ignore::DeprecationWarning:numba.*
    ignore::DeprecationWarning:numpy.*
    ignore::DeprecationWarning:pandas.*
    ignore::DeprecationWarning:dateutil.*
    ignore::DeprecationWarning:google.*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')