# 4b — autoscale the kernel-host pool. Baseline on CPU/mem; the §5.1 composite
# signal (reserved-memory-headroom + active-fit-count vs vCPU) is the custom
# metric `active_fits` exported by the API /metrics endpoint (4d) and surfaced via
# prometheus-adapter. kernel-count alone is a poor signal (idle-but-pinned kernels
# inflate it), so active fits drives scale-up.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: mmm-kernel-pool, namespace: mmm-system }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: mmm-kernel-warm-pool }
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 70 } }
    - type: Pods
      pods:
        metric: { name: active_fits }       # custom metric (4d /metrics)
        target: { type: AverageValue, averageValue: "1" }   # ~1 fit per host
  behavior:
    scaleUp: { stabilizationWindowSeconds: 0, policies: [{ type: Pods, value: 4, periodSeconds: 30 }] }
    scaleDown: { stabilizationWindowSeconds: 300 }   # don't yank hosts with idle-but-warm kernels
